networks:
  default:
    name: crowdfunding-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crowdfunding
      POSTGRES_USER: crowdfunding
      POSTGRES_PASSWORD: crowdfunding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowdfunding"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://crowdfunding:crowdfunding@postgres:5432/crowdfunding
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      JWT_SECRET: supersecretkey-change-in-production-32chars-min
      JWT_REFRESH_SECRET: superrefreshsecret-change-in-production
      BCRYPT_ROUNDS: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:

